name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: dotnet build RunOnce.sln -c Release /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test tests/RunOnce.Tests -c Release --no-build

      - name: Pack
        run: |
          dotnet pack src/RunOnce.Abstractions          -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/RunOnce.Core                  -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/RunOnce.Persistence.SqlServer -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/RunOnce.Persistence.DynamoDb  -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/RunOnce.Cli                   -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
